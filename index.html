<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Pancasila Kelas 12 - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #991B1B;
            --primary-soft: #FEF2F2;
            --gold: #B45309;
            --success: #059669;
            --error: #DC2626;
            --slate-bg: #F8FAFC;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--slate-bg);
            color: #0F172A;
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .q-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .q-card:hover {
            border-color: #CBD5E1;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .opt-btn {
            transition: all 0.25s ease;
            border: 1.5px solid #F1F5F9;
            background: #F8FAFC;
        }

        .opt-btn:hover:not(.locked) {
            border-color: var(--primary);
            background-color: var(--primary-soft);
            transform: translateX(4px);
        }

        .opt-btn.selected {
            border-color: var(--primary);
            background-color: var(--primary);
            color: white;
            transform: translateX(8px);
        }

        .opt-btn.correct {
            border-color: var(--success) !important;
            background-color: #ECFDF5 !important;
            color: var(--success) !important;
        }

        .opt-btn.wrong {
            border-color: var(--error) !important;
            background-color: #FEF2F2 !important;
            color: var(--error) !important;
        }

        .nav-dot {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #E2E8F0;
            background: white;
        }

        .nav-dot.answered { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(153, 27, 27, 0.2);
        }
        
        .nav-dot:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .section-divider {
            position: relative;
            text-align: center;
            margin: 4rem 0 2rem;
        }
        .section-divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, #E2E8F0, transparent);
        }
        .section-divider span {
            position: relative;
            background: var(--slate-bg);
            padding: 0 2rem;
            font-weight: 800;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.7rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide { animation: slideUp 0.5s ease-out forwards; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>

            {q:"Salah satu tugas MPR adalah...",opts:["Memeriksa keuangan negara","Melantik presiden dan wakil presiden","Mengadili perkara konstitusi","Menetapkan kebijakan moneter","Mengawasi hakim"],ans:1},
            {q:"Kerja sama bersifat sukarela berbeda dengan...",opts:["Gotong royong yang memiliki pamrih","Persaingan bebas","Kewajiban hukum","Peraturan pemerintah","Keputusan pengadilan"],ans:0},
            {q:"Nilai menghargai dalam gotong royong mencakup penghargaan terhadap...",opts:["Status sosial peserta","Keterampilan, kemampuan, dan tenaga yang disumbangkan","Jabatan tertinggi","Kekayaan materi","Latar belakang pendidikan"],ans:1},
            {q:"Dalam sidang paripurna MPR, presiden dan wakil presiden dilantik berdasarkan...",opts:["Keputusan DPR","Hasil pemilihan umum","Rekomendasi partai","Keputusan MA","Arahan KPK"],ans:1},
            {q:"Pelaksanaan gotong royong membantu...",opts:["Memperlambat pekerjaan","Mempercepat pekerjaan dan memanfaatkan waktu seefektif mungkin","Meningkatkan beban kerja","Mengurangi solidaritas","Memperkuat perbedaan"],ans:1},
            {q:"Peran DPD dalam pembuatan kebijakan nasional adalah...",opts:["Menetapkan undang-undang secara mandiri","Memberikan pertimbangan atas RUU terkait daerah","Mengawasi hakim","Memeriksa keuangan negara","Memberhentikan presiden"],ans:1},
            {q:"Gotong royong berbeda dari kerja sama biasa karena dilandasi oleh...",opts:["Motif ekonomi","Nilai kesukarelaan (tanpa pamrih)","Perintah pemerintah","Aturan hukum","Kepentingan finansial"],ans:1},
            {q:"Salah satu lembaga negara yang berperan dalam bidang keamanan selain Polri adalah...",opts:["BPK","KPK","Lembaga keamanan lainnya yang menjaga ketertiban","MA","Bank Indonesia"],ans:2},
            {q:"Presiden dibantu oleh satu orang...",opts:["Ketua DPR","Wakil presiden","Ketua MPR","Ketua MA","Kepala BPK"],ans:1},
            {q:"MPR bersidang sedikitnya...",opts:["Satu kali dalam lima tahun","Dua kali setahun","Tiga kali dalam tiga tahun","Empat kali setahun","Lima kali dalam lima tahun"],ans:0},
            {q:"Implementasi gotong royong di lingkungan keluarga dapat...",opts:["Mengurangi keharmonisan","Mempererat hubungan antaranggota keluarga","Meningkatkan persaingan","Mengurangi rasa kebersamaan","Menimbulkan konflik"],ans:1},
            {q:"Salah satu manfaat kerja sama adalah membentuk...",opts:["Persaingan bebas","Pribadi yang terbuka dan menerima perbedaan","Individualisme","Sikap egois","Kelompok eksklusif"],ans:1},
        ];

        const RAW_PGK = [
            {q:"Manakah yang termasuk lembaga legislatif di Indonesia?",opts:["MPR","DPR","DPD","Mahkamah Agung","Komisi Yudisial"],ans:[0,1,2]},
            {q:"Manakah yang merupakan fungsi DPR?",opts:["Legislasi","Anggaran","Pengawasan","Memeriksa keuangan negara","Mengadili perkara"],ans:[0,1,2]},
            {q:"Manakah yang termasuk nilai-nilai gotong royong?",opts:["Persatuan","Kebersamaan","Tolong-menolong","Persaingan","Individualisme"],ans:[0,1,2]},
            {q:"Manakah yang merupakan wewenang Mahkamah Konstitusi?",opts:["Menguji UU terhadap UUD","Memutus sengketa hasil pemilu","Memutus perselisihan kewenangan lembaga","Memeriksa keuangan negara","Mengangkat hakim agung"],ans:[0,1,2]},
            {q:"Manakah yang merupakan bentuk kerja sama?",opts:["Bargaining","Koalisi","Joint venture","Persaingan bebas","Konflik terbuka"],ans:[0,1,2]},
            {q:"Manakah yang termasuk lembaga yudikatif?",opts:["Mahkamah Agung","Mahkamah Konstitusi","Komisi Yudisial","DPR","BPK"],ans:[0,1,2]},
            {q:"Manakah implementasi gotong royong di lingkungan sekolah?",opts:["Piket kelas bersama","Kerja kelompok","Menjaga kebersihan lingkungan","Kompetisi nilai","Bekerja sendiri"],ans:[0,1,2]},
            {q:"Manakah yang merupakan tugas MPR?",opts:["Mengubah dan menetapkan UUD","Melantik presiden dan wakil presiden","Memberhentikan presiden sesuai UUD","Memeriksa keuangan","Mengawasi hakim"],ans:[0,1,2]},
            {q:"Manakah yang merupakan manfaat kerja sama?",opts:["Mengembangkan moralitas dan interaksi sosial","Meningkatkan kemampuan berkomunikasi","Membentuk kekompakan","Meningkatkan persaingan negatif","Mendorong isolasi"],ans:[0,1,2]},
            {q:"Manakah lembaga negara independen di Indonesia?",opts:["Bank Indonesia","KPK","BPK","DPR","Kementerian Keuangan"],ans:[0,1,2]},
        ];

        const ESSAY = [
            "Jelaskan perbedaan antara lembaga legislatif, eksekutif, dan yudikatif di Indonesia beserta contoh lembaganya masing-masing!",
            "Uraikan fungsi-fungsi DPR dalam sistem pemerintahan Indonesia berdasarkan UUD NRI Tahun 1945!",
            "Jelaskan peran Mahkamah Konstitusi dalam menjaga konstitusi dan demokrasi di Indonesia!",
            "Apa perbedaan antara kerja sama dan gotong royong? Berikan contoh masing-masing dalam kehidupan sehari-hari!",
            "Jelaskan nilai-nilai yang terkandung dalam gotong royong dan bagaimana nilai-nilai tersebut dapat memperkuat persatuan bangsa!",
            "Bagaimana peran BPK dalam menjaga akuntabilitas dan transparansi pengelolaan keuangan negara? Jelaskan!",
            "Uraikan implementasi gotong royong di lingkungan keluarga, sekolah, dan masyarakat beserta manfaatnya!",
            "Jelaskan kedudukan dan fungsi DPD dalam sistem ketatanegaraan Indonesia pascaamendemen UUD NRI Tahun 1945!",
            "Bagaimana amendemen UUD NRI Tahun 1945 memperkuat sistem demokrasi dan kedaulatan rakyat di Indonesia?",
            "Jelaskan peran lembaga negara (pilih salah satu: KPK, Komisi Yudisial, atau Bank Indonesia) dalam berbagai bidang kehidupan berbangsa dan bernegara!"
        ];

        // SHUFFLE LOGIC
        function shuffleOptions(data) {
            return data.map(item => {
                const correctTexts = Array.isArray(item.ans) 
                    ? item.ans.map(idx => item.opts[idx]) 
                    : item.opts[item.ans];

                const shuffledOpts = [...item.opts];
                for (let i = shuffledOpts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledOpts[i], shuffledOpts[j]] = [shuffledOpts[j], shuffledOpts[i]];
                }

                let newAns;
                if (Array.isArray(item.ans)) {
                    newAns = correctTexts.map(t => shuffledOpts.indexOf(t)).sort((a,b)=>a-b);
                } else {
                    newAns = shuffledOpts.indexOf(correctTexts);
                }

                return { ...item, opts: shuffledOpts, ans: newAns };
            });
        }

        const PG = shuffleOptions(RAW_PG);
        const PGK = shuffleOptions(RAW_PGK);

        let state = {
            answered: { pg: {}, pgk: {}, essay: {} },
            pgkTemp: {}
        };

        function updateUI() {
            const pgCount = Object.keys(state.answered.pg).length;
            const pgkCount = Object.keys(state.answered.pgk).length;
            const essayCount = Object.keys(state.answered.essay).length;
            const total = pgCount + pgkCount + essayCount;

            document.getElementById('prog-text').textContent = `${total}/120`;
            document.getElementById('prog-bar').style.width = `${(total/120)*100}%`;
            
            let benar = 0, salah = 0;
            Object.values(state.answered.pg).forEach(v => v ? benar++ : salah++);
            Object.values(state.answered.pgk).forEach(v => v ? benar++ : salah++);
            
            document.getElementById('head-benar').textContent = benar;
            document.getElementById('head-salah').textContent = salah;

            if(total === 120) {
                document.getElementById('finish-card').classList.remove('hidden');
                document.getElementById('res-benar').textContent = benar;
                document.getElementById('res-salah').textContent = salah;
                document.getElementById('res-skor').textContent = Math.round((benar / 110) * 100);
            }
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let html = '';

            // Render Section PG
            html += `<div class="section-divider"><span>Bagian I — Pilihan Ganda (100)</span></div>`;
            PG.forEach((q, i) => {
                html += `
                <div id="q-pg-${i}" class="q-card rounded-[2.5rem] p-10 animate-slide" style="animation-delay: ${i * 0.05}s">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-red-800 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Butir ${i+1}</span>
                        <div class="h-1 w-8 bg-slate-100 rounded-full"></div>
                        <span class="text-slate-400 text-[10px] font-black uppercase tracking-wider">Multiple Choice</span>
                    </div>
                    <p class="text-slate-900 font-bold leading-relaxed mb-10 text-lg md:text-xl">${q.q}</p>
                    <div class="grid grid-cols-1 gap-4">
                        ${q.opts.map((opt, oi) => `
                            <button onclick="handlePG(${i}, ${oi})" id="opt-pg-${i}-${oi}" class="opt-btn flex items-center text-left gap-5 p-5 rounded-2xl text-[15px] font-bold group">
                                <span class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-xs font-black text-slate-400 group-hover:border-red-800 transition-colors">${String.fromCharCode(65+oi)}</span>
                                <span class="flex-1">${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div id="fb-pg-${i}" class="mt-8 p-6 rounded-3xl hidden text-sm font-bold border transform transition duration-500 scale-95 opacity-0"></div>
                </div>`;
            });

            // Render Section PGK
            html += `<div class="section-divider"><span>Bagian II — PG Kompleks (10)</span></div>`;
            PGK.forEach((q, i) => {
                html += `
                <div id="q-pgk-${i}" class="q-card rounded-[2.5rem] p-10">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-amber-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Butir ${101+i}</span>
                        <div class="h-1 w-8 bg-slate-100 rounded-full"></div>
                        <span class="text-slate-400 text-[10px] font-black uppercase tracking-wider">Pilih 3 Jawaban</span>
                    </div>
                    <p class="text-slate-900 font-bold leading-relaxed mb-10 text-lg md:text-xl">${q.q}</p>
                    <div class="grid grid-cols-1 gap-4 mb-8">
                        ${q.opts.map((opt, oi) => `
                            <button onclick="handlePGKTemp(${i}, ${oi})" id="opt-pgk-${i}-${oi}" class="opt-btn flex items-center text-left gap-5 p-5 rounded-2xl text-[15px] font-bold">
                                <span class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-xs font-black text-slate-400">${String.fromCharCode(65+oi)}</span>
                                <span class="flex-1">${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                    <button id="check-pgk-${i}" onclick="checkPGK(${i})" disabled class="w-full py-5 bg-slate-100 text-slate-400 rounded-3xl font-black text-xs uppercase tracking-widest transition-all">Pilih 3 Jawaban</button>
                    <div id="fb-pgk-${i}" class="mt-8 p-6 rounded-3xl hidden text-sm font-bold border"></div>
                </div>`;
            });

            // Render Section Essay
            html += `<div class="section-divider"><span>Bagian III — Essay (10)</span></div>`;
            ESSAY.forEach((q, i) => {
                html += `
                <div id="q-essay-${i}" class="q-card rounded-[2.5rem] p-10">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-slate-900 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Butir ${111+i}</span>
                        <div class="h-1 w-8 bg-slate-100 rounded-full"></div>
                        <span class="text-slate-400 text-[10px] font-black uppercase tracking-wider">Uraian / Essay</span>
                    </div>
                    <p class="text-slate-900 font-bold leading-relaxed mb-10 text-lg md:text-xl">${q}</p>
                    <textarea id="inp-essay-${i}" placeholder="Analisis dan tuliskan jawaban Anda di sini..." class="w-full min-h-[200px] p-8 rounded-3xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-4 focus:ring-red-800/5 focus:bg-white transition-all text-sm font-medium mb-6 placeholder:text-slate-300"></textarea>
                    <button id="btn-essay-${i}" onclick="submitEssay(${i})" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl shadow-slate-200">Simpan Jawaban Uraian</button>
                    <div id="fb-essay-${i}" class="mt-6 p-6 rounded-3xl hidden bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs font-black uppercase tracking-widest">✓ Jawaban Tersimpan</div>
                </div>`;
            });

            container.innerHTML = html;
            renderNav();
        }

        function renderNav() {
            const pgNav = document.getElementById('nav-pg');
            const pgkNav = document.getElementById('nav-pgk');
            const essayNav = document.getElementById('nav-essay');

            pgNav.innerHTML = PG.map((_, i) => `<div id="dot-pg-${i}" onclick="scrollToSoal('q-pg-${i}')" class="nav-dot"> ${i+1} </div>`).join('');
            pgkNav.innerHTML = PGK.map((_, i) => `<div id="dot-pgk-${i}" onclick="scrollToSoal('q-pgk-${i}')" class="nav-dot"> ${101+i} </div>`).join('');
            essayNav.innerHTML = ESSAY.map((_, i) => `<div id="dot-essay-${i}" onclick="scrollToSoal('q-essay-${i}')" class="nav-dot"> ${111+i} </div>`).join('');
        }

        function scrollToSoal(id) {
            const el = document.getElementById(id);
            const headerOffset = 160;
            const elementPosition = el.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }

        function handlePG(qi, oi) {
            if(state.answered.pg[qi] !== undefined) return;
            const isCorrect = PG[qi].ans === oi;
            state.answered.pg[qi] = isCorrect;

            PG[qi].opts.forEach((_, idx) => {
                const btn = document.getElementById(`opt-pg-${qi}-${idx}`);
                btn.classList.add('locked');
                if(idx === PG[qi].ans) btn.classList.add('correct');
                else if(idx === oi) btn.classList.add('wrong');
            });

            const fb = document.getElementById(`fb-pg-${qi}`);
            fb.classList.remove('hidden');
            setTimeout(() => {
                fb.classList.remove('scale-95', 'opacity-0');
            }, 50);
            
            fb.className = `mt-8 p-6 rounded-3xl text-xs font-black uppercase tracking-[0.2em] border transition-all duration-500 ${isCorrect ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-red-50 text-red-700 border-red-100'}`;
            fb.innerHTML = isCorrect ? `✓ Jawaban Tepat` : `✗ Jawaban Benar: ${String.fromCharCode(65+PG[qi].ans)}`;
            
            document.getElementById(`dot-pg-${qi}`).classList.add('answered');
            updateUI();
        }

        function handlePGKTemp(qi, oi) {
            if(state.answered.pgk[qi] !== undefined) return;
            if(!state.pgkTemp[qi]) state.pgkTemp[qi] = new Set();
            const btn = document.getElementById(`opt-pgk-${qi}-${oi}`);
            if(state.pgkTemp[qi].has(oi)) {
                state.pgkTemp[qi].delete(oi);
                btn.classList.remove('selected');
            } else {
                if(state.pgkTemp[qi].size >= 3) return;
                state.pgkTemp[qi].add(oi);
                btn.classList.add('selected');
            }
            const checkBtn = document.getElementById(`check-pgk-${qi}`);
            if(state.pgkTemp[qi].size === 3) {
                checkBtn.disabled = false;
                checkBtn.className = "w-full py-5 bg-red-800 text-white rounded-3xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-red-100 hover:bg-red-900 transition-all";
                checkBtn.textContent = "Koreksi Jawaban";
            } else {
                checkBtn.disabled = true;
                checkBtn.className = "w-full py-5 bg-slate-100 text-slate-400 rounded-3xl font-black text-xs uppercase tracking-widest transition-all";
                checkBtn.textContent = `Pilih ${3 - state.pgkTemp[qi].size} Jawaban Lagi`;
            }
        }

        function checkPGK(qi) {
            const selected = Array.from(state.pgkTemp[qi]).sort((a,b)=>a-b);
            const correctArr = PGK[qi].ans;
            const isCorrect = JSON.stringify(selected) === JSON.stringify(correctArr);
            state.answered.pgk[qi] = isCorrect;
            PGK[qi].opts.forEach((_, idx) => {
                const btn = document.getElementById(`opt-pgk-${qi}-${idx}`);
                btn.classList.add('locked');
                if(correctArr.includes(idx)) btn.classList.add('correct');
                else if(selected.includes(idx)) btn.classList.add('wrong');
            });
            document.getElementById(`check-pgk-${qi}`).classList.add('hidden');
            const fb = document.getElementById(`fb-pgk-${qi}`);
            fb.classList.remove('hidden');
            fb.className = `mt-8 p-6 rounded-3xl text-xs font-black uppercase tracking-[0.2em] border ${isCorrect ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-red-50 text-red-700 border-red-100'}`;
            fb.innerHTML = isCorrect ? `✓ Jawaban Tepat` : `✗ Jawaban Benar: ${correctArr.map(a => String.fromCharCode(65+a)).join(', ')}`;
            document.getElementById(`dot-pgk-${qi}`).classList.add('answered');
            updateUI();
        }

        function submitEssay(qi) {
            const text = document.getElementById(`inp-essay-${qi}`).value.trim();
            if(!text) return;
            state.answered.essay[qi] = text;
            document.getElementById(`inp-essay-${qi}`).disabled = true;
            document.getElementById(`btn-essay-${qi}`).classList.add('hidden');
            document.getElementById(`fb-essay-${qi}`).classList.remove('hidden');
            document.getElementById(`dot-essay-${qi}`).classList.add('answered');
            updateUI();
        }

        window.onload = () => {
            renderQuiz();
            updateUI();
        };
    </script>
</body>
</html>
